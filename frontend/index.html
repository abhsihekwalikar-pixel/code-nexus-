<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UserHub - Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1 class="logo">User<span class="highlight">Hub</span></h1>
            <p class="subtitle">Manage users with secure authentication</p>
            
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('login')">Login</button>
                <button class="tab-btn" onclick="switchTab('register')">Register</button>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="auth-form active">
                <div class="input-group">
                    <input type="email" id="loginEmail" required placeholder=" " autocomplete="email">
                    <label>Email Address</label>
                </div>
                <div class="input-group">
                    <input type="password" id="loginPassword" required placeholder=" " autocomplete="current-password">
                    <label>Password</label>
                    <span class="toggle-password" onclick="togglePassword('loginPassword')">👁️</span>
                </div>
                <button type="submit" class="btn-primary" id="loginBtn">
                    <span class="btn-text">Sign In</span>
                    <span class="btn-loader hidden">Loading...</span>
                </button>
            </form>

            <!-- Register Form -->
            <form id="registerForm" class="auth-form">
                <div class="input-group">
                    <input type="text" id="regName" required placeholder=" " autocomplete="name">
                    <label>Full Name</label>
                </div>
                <div class="input-group">
                    <input type="email" id="regEmail" required placeholder=" " autocomplete="email">
                    <label>Email Address</label>
                </div>
                <div class="input-group">
                    <input type="password" id="regPassword" required placeholder=" " autocomplete="new-password" minlength="6">
                    <label>Password (min 6 characters)</label>
                </div>
                <div class="input-group">
                    <input type="password" id="regConfirmPassword" required placeholder=" " autocomplete="new-password">
                    <label>Confirm Password</label>
                </div>
                <div class="input-group">
                    <select id="regRole" required>
                        <option value="user">User</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                <button type="submit" class="btn-primary" id="registerBtn">
                    <span class="btn-text">Create Account</span>
                    <span class="btn-loader hidden">Creating...</span>
                </button>
            </form>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container"></div>

    <script src="js/app.js"></script>
</body>
</html>
